<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>web page 1</title>
    <style>
        
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #f4f5f7;
            margin: 0;
            padding: 40px;
            color: #0d2c6c; 
        }

        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        
        .custom-icon {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            width: 40px;
            height: 30px;
            position: relative;
        }
        .bar {
            background-color: #111;
            width: 6px;
        }
        .bar1 { height: 30%; }
        .bar2 { height: 55%; }
        .bar3 { height: 80%; }
        .bar4 { height: 100%; }
        
        
        .custom-icon::before {
            content: "🏃"; 
            position: absolute;
            left: 0px;
            bottom: 12px;
            font-size: 16px;
        }

        .logo-text {
            font-size: 42px;
            font-weight: normal;
            color: #0d2c6c;
        }

        
        .tagline {
            font-style: italic;
            font-size: 18px;
            color: #111;
        }
        .tagline span {
            color: #666;
            font-weight: normal;
        }

    
        .content {
            max-width: 600px;
            margin-top: 40px;
        }

        h1 {
            font-size: 52px;
            margin: 0 0 20px 0;
            font-weight: bold;
        }

        p {
            font-size: 24px;
            line-height: 1.5;
            margin: 0;
            color: #34d01f;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <div class="custom-icon">
                <div class="bar bar1"></div>
                <div class="bar bar2"></div>
                <div class="bar bar3"></div>
                <div class="bar bar4"></div>
            </div>
            <div class="logo-text">icon</div>
        </div>
        
        <div class="tagline">
            <strong>Marketing and growth</strong> | <span>Ankita</span>
        </div>
    </div>

    <div class="content">
        <h1>Front End</h1>
        <p>
            The front end of a website is everything the user either sees or 
            interacts with when they visits the website. It is responsible for the 
            look and feel of a website.
        </p>
    </div>

</body>
</html>
