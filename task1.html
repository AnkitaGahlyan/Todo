<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">

<div id="mainDiv" class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold text-center mb-6">My Tasks</h1>
    
    <div id="addBtnContainer" class="text-center">
        <button id="addBtn" class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-lg font-semibold">
            ADD
        </button>
    </div>

    <div id="formContainer" class="hidden bg-white p-5 rounded-lg shadow mb-6">
        <input id="taskBox" placeholder="Enter task" class="border border-gray-300 w-full px-4 py-2 rounded mb-3">
        <input id="discriptionBox" placeholder="Enter description" class="border border-gray-300 w-full px-4 py-2 rounded mb-3">
        <button id="addBtnBox" class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2 rounded w-full">Save</button>
    </div>

    <div id="tasksList" class="space-y-4"></div>
</div>

<script>
let mainDiv = document.getElementById("mainDiv");
let addBtn = document.getElementById("addBtn");
let addBtnContainer = document.getElementById("addBtnContainer");
let formContainer = document.getElementById("formContainer");
let taskBox = document.getElementById("taskBox");
let discriptionBox = document.getElementById("discriptionBox");
let addBtnBox = document.getElementById("addBtnBox");
let tasksList = document.getElementById("tasksList");

let editingItem = null;

// Step 1: Sirf ADD button dikhao
formContainer.classList.add("hidden");

// Step 2: ADD click -> form show, ADD button hide
addBtn.addEventListener("click", () => {
    addBtnContainer.classList.add("hidden");
    formContainer.classList.remove("hidden");
    taskBox.focus();
});

// Step 3: Save click -> item create
addBtnBox.addEventListener("click", () => {
    let taskVal = taskBox.value.trim();
    let descVal = discriptionBox.value.trim();

    if(taskVal === "" || descVal === "") {
        alert("Please enter both task and description");
        return;
    }

    if(editingItem) {
        // Edit mode: existing item update
        editingItem.querySelector(".taskText").innerText = taskVal;
        editingItem.querySelector(".descText").innerText = descVal;
        editingItem = null;
    } else {
        // Naya item banao
        createTaskItem(taskVal, descVal);
    }

    // Reset
    taskBox.value = "";
    discriptionBox.value = "";
    formContainer.classList.add("hidden");
    addBtnContainer.classList.remove("hidden");
});

function createTaskItem(task, desc) {
    let item = document.createElement("div");
    item.classList = "bg-white p-4 rounded-lg shadow border-gray-200";

    item.innerHTML = `
        <h2 class="taskText font-bold text-lg text-gray-800 mb-1">${task}</h2>
        <p class="descText text-gray-600 mb-3">${desc}</p>
        <div class="flex gap-2">
            <button class="editBtn bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-1 rounded text-sm">Edit</button>
            <button class="binBtn bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm">Bin</button>
            <button class="doneBtn bg-gray-400 hover:bg-gray-500 text-white px-3 py-1 rounded text-sm">Done</button>
        </div>
    `;

    // Edit button
    item.querySelector(".editBtn").addEventListener("click", () => {
        taskBox.value = item.querySelector(".taskText").innerText;
        discriptionBox.value = item.querySelector(".descText").innerText;
        editingItem = item;
        formContainer.classList.remove("hidden");
        addBtnContainer.classList.add("hidden");
        item.remove(); // purana wala hata do, save par naya banega
    });

    // Bin button
    item.querySelector(".binBtn").addEventListener("click", () => {
        item.remove();
    });

    // Done button
    item.querySelector(".doneBtn").addEventListener("click", () => {
        item.classList.toggle("bg-green-100");
        item.classList.toggle("border-green-400");
        item.querySelector(".taskText").classList.toggle("line-through");
        item.querySelector(".descText").classList.toggle("line-through");
        
        let btn = item.querySelector(".doneBtn");
        if(btn.innerText === "Done") {
            btn.innerText = "Undo";
            btn.classList.remove("bg-gray-400");
            btn.classList.add("bg-green-500");
        } else {
            btn.innerText = "Done";
            btn.classList.remove("bg-green-500");
            btn.classList.add("bg-gray-400");
        }
    });

    tasksList.appendChild(item);
}

// Enter press se bhi save ho jaye
taskBox.addEventListener("keypress", e => {
    if(e.key === "Enter") addBtnBox.click();
});
discriptionBox.addEventListener("keypress", e => {
    if(e.key === "Enter") addBtnBox.click();
});
</script>

</body>
</html>
